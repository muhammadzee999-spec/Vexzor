<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | VEXZOR</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="brand-logo">VEXZOR</a>
        </div>
        <div class="nav-center">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="index.html#about">About</a>
            <a href="index.html#contact">Contact</a>
        </div>
        <div class="nav-right">
            <a href="login.html" class="auth-link"><i class="fa fa-user"></i> <span class="hide-mobile">LOGIN</span></a>
            <a href="cart.html" class="cart-icon-wrapper">
                <i class="fa fa-shopping-bag"></i>
                <span class="cart-count">0</span>
            </a>
            <div class="menu-btn" id="menu-btn">
                <i class="fa fa-bars"></i>
            </div>
        </div>
    </nav>

    <div class="pdp-container" id="pdp-container">
        <!-- Rendered via JS -->
    </div>

        <div class="footer">
        <div class="footer-container">
            <!-- Logo -->
            <div class="footer-logo">
                <h2 class="brand-logo" style="margin-bottom:0.5rem; color:white;">VEXZOR</h2>
                <p>Wear Your Power.</p>
            </div>

            <!-- Column 1 -->
            <div class="footer-col">
                <h4>Shop</h4>
                <a href="shop.html?cat=top">Top Wear</a>
                <a href="shop.html?cat=bottom">Bottom Wear</a>
                <a href="shop.html?cat=essentials">Essentials</a>
                <a href="shop.html?cat=accessories">Accessories</a>
            </div>

            <!-- Column 2 -->
            <div class="footer-col">
                <h4>Company</h4>
                <a href="index.html#about">About Us</a>
                <a href="index.html#contact">Contact Us</a>
                <a href="#">Support</a>
            </div>

            <!-- Right -->
            <div class="footer-right">
                <h4>Stay Updated</h4>

                <div class="social">
                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-twitter"></i></a>
                </div>

                <div class="email-box">
                    <input type="email" placeholder="Email Address">
                    <button>Subscribe</button>
                </div>
            </div>
        </div>

        <div class="footer-bottom">
            &copy; 2026 VEXZOR Worldwide. All rights reserved.
        </div>
    </div>

    <!-- Global Scroll to Top Button -->
    <button id="scrollToTop" class="scroll-to-top" title="Go to top">
        <i class="fa fa-arrow-up"></i>
    </button>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            const product = products.find(p => p.id == productId);

            const container = document.getElementById('pdp-container');

            if (product) {
                container.innerHTML = `
                    <div class="pdp-images">
                        <img src="${product.image}" class="pdp-main-image" id="main-image">
                        <div class="pdp-thumbnails">
                            ${product.images.map((img, index) => `
                                <img src="${img}" class="thumbnail ${index === 0 ? 'active' : ''}" onclick="swapImage(this, '${img}')">
                            `).join('')}
                        </div>
                    </div>
                    <div class="pdp-details">
                        <h1 class="pdp-title">${product.name}</h1>
                        <div class="pdp-price">$${product.price.toFixed(2)}</div>
                        <p class="pdp-desc">${product.desc}</p>
                        <button class="btn btn-dark btn-buy" onclick="addToCart(${product.id})">ADD TO CART</button>
                    </div>
                `;
            } else {
                container.innerHTML = `<h2>Product not found. <a href="shop.html">Return to shop.</a></h2>`;
            }
        });

        function swapImage(element, imgUrl) {
            document.getElementById('main-image').src = imgUrl;
            document.querySelectorAll('.thumbnail').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
