<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | VEXZOR</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 5rem auto;
            padding: 2rem;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-radius: 8px;
            text-align: center;
        }
        .auth-container h2 { margin-bottom: 2rem; }
        .auth-container .auth-links { margin-top: 1.5rem; font-size: 0.9rem; }
        .auth-container .auth-links a { color: var(--accent-color); font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="brand-logo">VEXZOR</a>
        </div>
        <div class="nav-center">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="index.html#about">About</a>
            <a href="index.html#contact">Contact</a>
        </div>
        <div class="nav-right">
            <a href="login.html" class="auth-link"><i class="fa fa-user"></i> <span class="hide-mobile">LOGIN</span></a>
            <a href="cart.html" class="cart-icon-wrapper">
                <i class="fa fa-shopping-bag"></i>
                <span class="cart-count">0</span>
            </a>
            <div class="menu-btn" id="menu-btn">
                <i class="fa fa-bars"></i>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <h2>CREATE ACCOUNT</h2>
        <form id="signup-form">
            <div class="form-group">
                <input type="text" id="signup-name" class="form-control" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <input type="email" id="signup-email" class="form-control" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" id="signup-password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-dark" style="width: 100%;">REGISTER</button>
        </form>
        <div class="auth-links">
            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>

      <div class="footer">
        <div class="footer-container">
            <!-- Logo -->
            <div class="footer-logo">
                <h2 class="brand-logo" style="margin-bottom:0.5rem; color:white;">VEXZOR</h2>
                <p>Wear Your Power.</p>
            </div>

            <!-- Column 1 -->
            <div class="footer-col">
                <h4>Shop</h4>
                <a href="shop.html?cat=top">Top Wear</a>
                <a href="shop.html?cat=bottom">Bottom Wear</a>
                <a href="shop.html?cat=essentials">Essentials</a>
                <a href="shop.html?cat=accessories">Accessories</a>
            </div>

            <!-- Column 2 -->
            <div class="footer-col">
                <h4>Company</h4>
                <a href="index.html#about">About Us</a>
                <a href="index.html#contact">Contact Us</a>
                <a href="#">Support</a>
            </div>

            <!-- Right -->
            <div class="footer-right">
                <h4>Stay Updated</h4>

                <div class="social">
                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-twitter"></i></a>
                </div>

                <div class="email-box">
                    <input type="email" placeholder="Email Address">
                    <button>Subscribe</button>
                </div>
            </div>
        </div>

        <div class="footer-bottom">
            &copy; 2026 VEXZOR Worldwide. All rights reserved.
        </div>
    </div>

    <!-- Global Scroll to Top Button -->
    <button id="scrollToTop" class="scroll-to-top" title="Go to top">
        <i class="fa fa-arrow-up"></i>
    </button>

    <script type="module" src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
