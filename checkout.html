<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | VEXZOR</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- EmailJS SDK (Important for email functionality) -->
    <script type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    <script type="text/javascript">
    (function(){
        emailjs.init({
            publicKey: "xbAmxfqdwVx-xhbed",
        });
    })();
    </script>
    <style>
        .checkout-container { max-width: 600px; margin: 4rem auto; padding: 2rem; background: white; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid var(--border-color); }
        .order-summary { background: #f9f9f9; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; border: 1px dashed #ddd; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .summary-total { border-top: 1px solid #eee; margin-top: 1rem; padding-top: 1rem; font-weight: 700; font-size: 1.1rem; display: flex; justify-content: space-between; }
        .btn-loading { background: #555 !important; cursor: not-allowed; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-loading i { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="brand-logo">VEXZOR</a>
        </div>
        <div class="nav-center">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="index.html#about">About</a>
            <a href="index.html#contact">Contact</a>
        </div>
        <div class="nav-right">
            <a href="login.html" class="auth-link"><i class="fa fa-user"></i> <span class="hide-mobile">LOGIN</span></a>
            <a href="cart.html" class="cart-icon-wrapper">
                <i class="fa fa-shopping-bag"></i>
                <span class="cart-count">0</span>
            </a>
            <div class="menu-btn" id="menu-btn">
                <i class="fa fa-bars"></i>
            </div>
        </div>
    </nav>

    <div class="checkout-container">
        <h2 style="margin-bottom: 1rem;">SECURE CHECKOUT</h2>
        
        <div class="order-summary" id="order-summary">
            <h4 style="margin-bottom: 1rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem;">Order Summary</h4>
            <div id="summary-items">
                <!-- Items will be injected here -->
            </div>
            <div class="summary-total">
                <span>Total</span>
                <span id="summary-total-amount">$0.00</span>
            </div>
        </div>
        <form id="checkout-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="chk-name" class="form-control" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="chk-email" class="form-control" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Shipping Address</label>
                <input type="text" id="chk-address" class="form-control" required placeholder="123 Street Name, City">
            </div>
            
            <div style="background: var(--bg-secondary); padding: 1rem; border-radius: 4px; margin-bottom: 2rem;">
                <h4 style="margin-bottom: 0.5rem;">Payment Method</h4>
                <p style="font-size: 0.9rem; color: var(--text-light);">CASH ON DELIVERY (COD)</p>
            </div>

            <button type="submit" id="confirm-btn" class="btn btn-dark" style="width: 100%;">CONFIRM ORDER</button>
        </form>
    </div>

    <div class="footer" style="margin-top: 5rem;">
        <div class="footer-container">
            <!-- Logo -->
            <div class="footer-logo">
                <h2 class="brand-logo" style="margin-bottom:0.5rem; color:white;">VEXZOR</h2>
                <p>Wear Your Power.</p>
            </div>

            <!-- Column 1 -->
            <div class="footer-col">
                <h4>Shop</h4>
                <a href="shop.html?cat=top">Top Wear</a>
                <a href="shop.html?cat=bottom">Bottom Wear</a>
                <a href="shop.html?cat=essentials">Essentials</a>
                <a href="shop.html?cat=accessories">Accessories</a>
            </div>

            <!-- Column 2 -->
            <div class="footer-col">
                <h4>Company</h4>
                <a href="index.html#about">About Us</a>
                <a href="index.html#contact">Contact Us</a>
                <a href="#">Support</a>
            </div>

            <!-- Right -->
            <div class="footer-right">
                <h4>Stay Updated</h4>

                <div class="social">
                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-twitter"></i></a>
                </div>

                <div class="email-box">
                    <input type="email" placeholder="Email Address">
                    <button>Subscribe</button>
                </div>
            </div>
        </div>

        <div class="footer-bottom">
            &copy; 2026 VEXZOR Worldwide. All rights reserved.
        </div>
    </div>

    <!-- Global Scroll to Top Button -->
    <button id="scrollToTop" class="scroll-to-top" title="Go to top">
        <i class="fa fa-arrow-up"></i>
    </button>

    <!-- Scripts -->
    <script src="js/cart.js"></script>
    <script src="js/checkout.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
